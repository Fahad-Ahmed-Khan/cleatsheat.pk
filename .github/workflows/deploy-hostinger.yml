name: Deploy to Hostinger (SSH)

on:
  push:
    branches: ["master"]
  workflow_dispatch: {}

concurrency:
  group: hostinger-deploy-master
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader --ignore-platform-reqs

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi --no-interaction

      - name: Run tests
        env:
          APP_ENV: testing
        run: composer test

      # Native rsync/ssh with retries — appleboy/docker SCP often hits Hostinger SSH rate limits / timeouts.
      - name: Upload build and deploy on Hostinger
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          APP_PATH: ${{ secrets.HOSTINGER_APP_PATH }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/hostinger_deploy
          chmod 600 ~/.ssh/hostinger_deploy
          trap 'rm -f ~/.ssh/hostinger_deploy' EXIT

          export RSYNC_RSH="ssh -i ~/.ssh/hostinger_deploy -p ${SSH_PORT} -o BatchMode=yes -o ConnectTimeout=120 -o ServerAliveInterval=30 -o StrictHostKeyChecking=accept-new"
          SSH_CMD=(ssh -i ~/.ssh/hostinger_deploy -p "$SSH_PORT" -o BatchMode=yes -o ConnectTimeout=120 -o ServerAliveInterval=30 -o StrictHostKeyChecking=accept-new)
          SSH_TARGET="${SSH_USER}@${SSH_HOST}"
          REMOTE_BUILD="${APP_PATH}/public/build/"

          run_remote() {
            local label="$1"; shift
            for attempt in 1 2 3; do
              echo "${label} (attempt ${attempt}/3)"
              if "$@"; then
                return 0
              fi
              sleep 60
            done
            echo "::error::${label} failed after 3 attempts."
            return 1
          }

          # 1) Sync code + run migrations FIRST (this does `git reset --hard`,
          #    which would otherwise clobber freshly-uploaded build assets).
          run_remote "deploy.sh prepare" \
            "${SSH_CMD[@]}" "$SSH_TARGET" "set -euo pipefail; cd '${APP_PATH}' && bash ./deploy.sh prepare"

          # 2) Upload freshly-built assets. public/build is gitignored, so the
          #    git reset above never touches it.
          run_remote "rsync public/build → ${REMOTE_BUILD}" \
            rsync -az --delete public/build/ "${SSH_TARGET}:${REMOTE_BUILD}"

          # 3) Rebuild caches and bring the app back up now that assets are in place.
          run_remote "deploy.sh finalize" \
            "${SSH_CMD[@]}" "$SSH_TARGET" "set -euo pipefail; cd '${APP_PATH}' && bash ./deploy.sh finalize"

          echo "Deploy succeeded."
