name: Deploy to Hostinger (production branch)

on:
  push:
    branches: ["master"]
  workflow_dispatch: {}

concurrency:
  group: hostinger-deploy-master
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader --ignore-platform-reqs

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi --no-interaction

      - name: Run tests
        env:
          APP_ENV: testing
        run: composer test

      # Hostinger blocks SSH from GitHub Actions IPs. CI builds assets and pushes
      # the `production` branch; GitHub webhook triggers pull-deploy on the server.
      - name: Push production branch with built assets
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B production
          git add -f public/build
          git commit -m "deploy: ${GITHUB_SHA} [${GITHUB_REF_NAME}]"

          git push origin production --force

          echo "Pushed production branch. GitHub webhook will pull and run deploy.sh on the server."

  notify:
    needs: ci
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send CI deploy email
        if: ${{ secrets.DEPLOY_NOTIFY_EMAIL != '' && secrets.MAIL_HOST != '' }}
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.MAIL_HOST }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ needs.ci.result == 'success' && '✅' || '❌' }} Tryino CI deploy — ${{ needs.ci.result }}
          to: ${{ secrets.DEPLOY_NOTIFY_EMAIL }}
          from: ${{ secrets.MAIL_FROM_ADDRESS }}
          body: |
            GitHub Actions "Deploy to Hostinger" workflow finished.

            Result: ${{ needs.ci.result }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ${{ needs.ci.result == 'success' && 'Built assets were pushed to the production branch. The server should pull via webhook shortly; you will get a separate email when the Hostinger deploy finishes (if DEPLOY_NOTIFY_ENABLED is set on the server).' || 'The production branch was not updated. Fix the failing job and push again.' }}
