name: Deploy to Hostinger (SSH)

on:
  push:
    branches: ["master"]
  workflow_dispatch: {}

concurrency:
  group: hostinger-deploy-master
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader --ignore-platform-reqs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi --no-interaction

      - name: Run tests
        env:
          APP_ENV: testing
        run: composer test

      - name: Upload Vite build to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          source: "public/build"
          target: ${{ secrets.HOSTINGER_APP_PATH }}/public/
          strip_components: 0
          overwrite: true

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ secrets.HOSTINGER_APP_PATH }}"
            bash ./deploy.sh
